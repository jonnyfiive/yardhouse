// Map API type values to short display codes
var TYPE_MAP = { "Delivery": "DEL", "Pick Up": "P/U", "Drop Trailer": "DROP", "Pick Up Trailer": "PICK", "CPU": "CPU" };

// Normalize an API delivery object into the shape the UI expects
function normalizeDelivery(d) {
  return {
    id: d.id,
    customer: d.customer || d.title || "",
    customerId: d.customerId || "",
    type: TYPE_MAP[d.type] || d.type || "DEL",
    driver: d.driver || "",
    trip: d.trip || null,
    status: d.status || "Scheduled",
    notes: d.notes || "",
    address: "",  // address not in API, will use customer lookup
    notionUrl: d.notionUrl || "",
    date: d.date || ""
  };
}

// Normalize an API customer object into the shape the UI expects
function normalizeCustomer(c) {
  return {
    id: c.id,
    name: c.name || "",
    contacts: (c.contacts || []).map(function(ct) {
      return { name: ct.name || "", role: ct.title || "", phone: ct.phone || "", email: ct.email || "" };
    }),
    city: (function() {
      var addr = c.address || "";
      // Try to extract "City, ST" from end of address
      var parts = addr.split(",");
      if (parts.length >= 2) {
        var city = parts[parts.length - 2].trim();
        var state = parts[parts.length - 1].trim().split(" ")[0];
        return city + ", " + state;
      }
      return addr;
    })(),
    address: c.address || "",
    balance: 0,  // Will be filled from AR data if available
    phone: c.phone || "",
    products: (c.products || []).map(function(p) {
      return { id: p.id, name: p.product || p.name || "", price: p.price != null ? "$" + Number(p.price).toFixed(2) : "—" };
    }),
    notionUrl: c.notionUrl || ""
  };
}

                    }
                  }

              }
            }
          });
          DataStore._notify();
        }
        return data;
      })
      .catch(function() { return null; });
  },

  patchDelivery: function(pageId, updates) {

      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(updates)

      }
      return data;
    })

  },

  deleteDelivery: function(pageId) {

      return data;
    })
    .catch(function(err) { console.warn("Failed to delete delivery:", err); return { error: err.message }; });
  },

  createDelivery: function(deliveryData) {
    return fetch(API_BASE + "/api/deliveries", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(deliveryData)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === "ok") {
        setTimeout(function() { DataStore.fetchDeliveries(); }, 300);
      }
      return data;
    })
    .catch(function(err) { console.warn("Failed to create delivery:", err); return { error: err.message }; });
  },

    DataStore.fetchDeliveries();
    // Fetch AR after customers are loaded so we can merge balances
    DataStore.fetchCustomers().then(function() {

  }

if ('serviceWorker' in navigator) {

(function() {
  var THRESHOLD = 80;
  var MAX_PULL = 180;
  var RESISTANCE = 0.55;

  function dampedPull(raw) {
    // iOS-style diminishing resistance: pulls far at first, slows down
    if (raw <= 0) return 0;
    return Math.min(raw * RESISTANCE * (1 - raw / (MAX_PULL * 4)), MAX_PULL);

  function setupPTR(scrollArea) {
    var indicator = document.createElement('div');
    indicator.className = 'ptr-indicator';
    var spinner = document.createElement('div');
    spinner.className = 'ptr-spinner';
    spinner.innerHTML = '<div class="ptr-dot ptr-dot1"></div><div class="ptr-dot ptr-dot2"></div><div class="ptr-dot ptr-dot3"></div>';
    indicator.appendChild(spinner);
    scrollArea.insertBefore(indicator, scrollArea.firstChild);

    var startY = 0;
    var pulling = false;
    var pullDist = 0;
    var refreshing = false;
    var children = null;

    function getChildren() {

    function setTranslate(dist) {

      indicator.style.top = '-40px';

      if (animate) {

          indicator.style.transform = '';
