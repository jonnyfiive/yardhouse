function initScrollReveal() {
  const els = document.querySelectorAll('.reveal');
  els.forEach(el => {
    const ch = el.querySelectorAll('.itin-row, .email-row, .move-row, .pill-row');
    ch.forEach((c, i) => {
      c.style.opacity = '0'; c.style.transform = 'translateY(10px)';
      c.style.transition = `opacity 0.45s var(--smooth) ${i*0.04}s, transform 0.45s var(--smooth) ${i*0.04}s`;
    });
  });
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        const ch = e.target.querySelectorAll('.itin-row, .email-row, .move-row, .pill-row');
        ch.forEach(c => { c.style.opacity = '1'; c.style.transform = 'translateY(0)'; });
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -20px 0px' });
  els.forEach(el => obs.observe(el));
}

// ═══ DRAG & DROP REORDER ═══
let dragState = null;

function initDragDrop() {
  const handles = document.querySelectorAll('.drag-handle');
  handles.forEach(handle => {
    handle.addEventListener('pointerdown', onDragStart);
  });
}

function onDragStart(e) {
  e.preventDefault();
  const handle = e.currentTarget;
  const row = handle.closest('.itin-row');
  if (!row || row.classList.contains('completed')) return;

  const list = row.parentElement;
  const rows = Array.from(list.querySelectorAll('.itin-row:not(.completed)'));
  const startIdx = rows.indexOf(row);
  if (startIdx === -1) return;

  const rect = row.getBoundingClientRect();
  const rowHeight = rect.height + 2; // gap

  dragState = {
    row, list, rows, startIdx, currentIdx: startIdx,
    startY: e.clientY, rowHeight,
    offsetY: e.clientY - rect.top
  };

  row.classList.add('dragging');
  list.classList.add('drag-active');
  row.style.zIndex = '10';

  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd);
}

function onDragMove(e) {
  if (!dragState) return;
  dragState._lastY = e.clientY;
  if (!dragState._rafPending) {
    dragState._rafPending = true;
    requestAnimationFrame(() => {
      if (!dragState) return;
      dragState._rafPending = false;
      const { row, rows, startIdx, rowHeight } = dragState;
      const delta = dragState._lastY - dragState.startY;
      row.style.transform = `translateY(${delta}px)`;

      const newIdx = Math.max(0, Math.min(rows.length - 1, startIdx + Math.round(delta / rowHeight)));

      if (newIdx !== dragState.currentIdx) {
        rows.forEach((r, i) => {
          if (r === row) return;
          if (i >= Math.min(startIdx, newIdx) && i <= Math.max(startIdx, newIdx)) {
            const shift = newIdx > startIdx
              ? (i > startIdx && i <= newIdx ? -rowHeight : 0)
              : (i >= newIdx && i < startIdx ? rowHeight : 0);
            r.style.transform = `translateY(${shift}px)`;
          } else {
            r.style.transform = '';
          }
        });
        dragState.currentIdx = newIdx;
      }
    });
  }
}

function onDragEnd(e) {
  if (!dragState) return;
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);

  const { row, list, rows, startIdx, currentIdx } = dragState;

  // Kill transitions FIRST so clearing transforms doesn't animate/bounce
  rows.forEach(r => { r.style.transition = 'none'; });

  // Remove drag classes
  list.classList.remove('drag-active');
  row.classList.remove('dragging');

  // Clear all transforms instantly (no transition = no bounce)
  rows.forEach(r => { r.style.transform = ''; r.style.zIndex = ''; });

  // Force a layout flush so the "none" transition + cleared transforms commit
  void row.offsetHeight;

  // Restore transitions
  rows.forEach(r => { r.style.transition = ''; });

  if (startIdx !== currentIdx) {
    // DOM reorder
    const target = rows[currentIdx];
    if (currentIdx > startIdx) {
      target.after(row);
    } else {
      target.before(row);
    }

    // Save new order to localStorage
    const reorderKey = 'jn-reorder-' + new Date().toISOString().slice(0,10);
    const reorderedRows = Array.from(list.querySelectorAll('.itin-row:not(.completed)'));
    const newOrder = reorderedRows.map(r => parseInt(r.dataset.origIdx, 10));
    // Append completed items in their original order
    const completedRows = Array.from(list.querySelectorAll('.itin-row.completed'));
    completedRows.forEach(r => newOrder.push(parseInt(r.dataset.origIdx, 10)));
    // Also include items from completed section
    const completedSection = document.querySelector('.completed-section');
    if (completedSection) {
      const csRows = completedSection.querySelectorAll('.itin-row');
      csRows.forEach(r => newOrder.push(parseInt(r.dataset.origIdx, 10)));
    }
    localStorage.setItem(reorderKey, JSON.stringify(newOrder));

    // Update focus-item class
    const allActive = list.querySelectorAll('.itin-row:not(.completed)');
    allActive.forEach((r, i) => {
      r.classList.toggle('focus-item', i === 0);
    });
  }

  dragState = null;
}

function getAvatarColor(name) {
  let h = 0;
  for (let i = 0; i < (name||'').length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return CUST_COLORS[Math.abs(h) % CUST_COLORS.length];
}
function getInitials(name) {
  if (!name) return '?';
  const parts = name.split(/\s+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}

function renderCustomerList(filter) {
  const panel = document.getElementById('custPanel');
  const wasDetail = panel.classList.contains('detail-mode');
  panel.classList.remove('detail-mode');
  if (wasDetail) {
    panel.classList.remove('list-rebound');
    void panel.offsetWidth; // force reflow to restart animation
    panel.classList.add('list-rebound');
    panel.addEventListener('animationend', () => panel.classList.remove('list-rebound'), { once: true });
  }
  const content = document.getElementById('custContent');
  const q = (filter || '').toLowerCase();
  const filtered = custData.filter(c => {
    if (!q) return true;
    if (c.name.toLowerCase().includes(q)) return true;
    if ((c.address||'').toLowerCase().includes(q)) return true;
    if ((c.phone||'').includes(q)) return true;
    if (c.contacts && c.contacts.some(ct => (ct.name||'').toLowerCase().includes(q) || (ct.email||'').toLowerCase().includes(q))) return true;
    return false;
  }).sort((a, b) => (a.name || '').localeCompare(b.name || ''));

  if (!filtered.length) {
    content.innerHTML = '<div class="cust-empty">No customers match your search</div>';
    return;
  }

  let html = '<div class="cust-grid">';
  filtered.forEach((c, idx) => {
    const color = getAvatarColor(c.name);
    const initials = getInitials(c.name);
    const meta = c.address || (c.contacts && c.contacts[0] ? c.contacts[0].email : '') || '';
    const hl = (q && idx === 0) ? ' cust-highlighted' : '';
    html += `<div class="cust-item${hl}" data-cust-idx="${idx}" data-cust-id="${c.id}" onclick="showCustomerDetail('${c.id}')">
      <div class="cust-avatar" style="background:${color}">${initials}</div>
      <div class="cust-item-info">
        <div class="cust-item-name">${esc(c.name)}</div>
        <div class="cust-item-meta">${esc(meta)}</div>
      </div>
      <span class="cust-item-arrow">&rsaquo;</span>
    </div>`;
  });
  html += '</div>';
  content.innerHTML = html;
  custDetailId = null;
  custHighlightIdx = q ? 0 : -1;
}

async function custSaveChanges(id) {
  const c = custData.find(x => x.id === id);
  if (!c) return;

  // Collect edited values
  const nameEl = document.getElementById('cedit-name');
  const addrEl = document.getElementById('cedit-address');
  const addr2El = document.getElementById('cedit-address2');
  const phoneEl = document.getElementById('cedit-phone');
  const groupEl = document.getElementById('cedit-group');
  const hoursEl = document.getElementById('cedit-hours');
  const notesEl = document.getElementById('cedit-notes');

  const payload = {
    pageId: c.pageId,
    customer: {},
    contacts: [],
  };

  // Only send changed fields
  if (nameEl && nameEl.value !== c.name) payload.customer.name = nameEl.value;
  if (addrEl && addrEl.value !== (c.address||'')) payload.customer.address = addrEl.value;
  if (addr2El && addr2El.value !== (c.address2||'')) payload.customer.address2 = addr2El.value;
  if (phoneEl && phoneEl.value !== (c.phone||'')) payload.customer.phone = phoneEl.value;
  if (groupEl && groupEl.value !== (c.group||'')) payload.customer.group = groupEl.value;
  if (hoursEl && hoursEl.value !== (c.hours||'')) payload.customer.hours = hoursEl.value;
  if (notesEl && notesEl.value !== (c.notes||'')) payload.customer.notes = notesEl.value;

  // Contacts
  if (c.contacts) {
    c.contacts.forEach((ct, idx) => {
      const ctName = document.getElementById(`cedit-ct-${idx}-name`);
      const ctTitle = document.getElementById(`cedit-ct-${idx}-title`);
      const ctEmail = document.getElementById(`cedit-ct-${idx}-email`);
      const ctPhone = document.getElementById(`cedit-ct-${idx}-phone`);

      if (!ct.pageId) return; // Can't update without a page ID

      const ctData = {};
      let changed = false;
      if (ctName && ctName.value !== (ct.name||'')) { ctData.name = ctName.value; changed = true; }
      if (ctTitle && ctTitle.value !== (ct.title||'')) { ctData.title = ctTitle.value; changed = true; }
      if (ctEmail && ctEmail.value !== (ct.email||'')) { ctData.email = ctEmail.value; changed = true; }
      if (ctPhone && ctPhone.value !== (ct.phone||'')) { ctData.phone = ctPhone.value; changed = true; }

      if (changed) {
        payload.contacts.push({ pageId: ct.pageId, data: ctData });
      }
    });
  }

  // Check if anything changed
  const custChanged = Object.keys(payload.customer).length > 0;
  const ctChanged = payload.contacts.length > 0;
  if (!custChanged && !ctChanged) {
    custEditMode = false;
    showCustomerDetail(id);
    return;
  }

  // Show saving state
  const saveBtn = document.querySelector('.cust-save-btn');
  if (saveBtn) { saveBtn.classList.add('cust-saving'); saveBtn.innerHTML = custIcons.save + ' Saving...'; }

  try {
    const resp = await fetch('/api/customers/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const result = await resp.json();

    if (result.status === 'ok') {
      // Update local data
      if (nameEl) c.name = nameEl.value;
      if (addrEl) c.address = addrEl.value;
      if (addr2El) c.address2 = addr2El.value;
      if (phoneEl) c.phone = phoneEl.value;
      if (groupEl) c.group = groupEl.value;
      if (hoursEl) c.hours = hoursEl.value;
      if (notesEl) c.notes = notesEl.value;
      if (c.contacts) {
        c.contacts.forEach((ct, idx) => {
          const n = document.getElementById(`cedit-ct-${idx}-name`);
          const t = document.getElementById(`cedit-ct-${idx}-title`);
          const e = document.getElementById(`cedit-ct-${idx}-email`);
          const p = document.getElementById(`cedit-ct-${idx}-phone`);
          if (n) ct.name = n.value;
          if (t) ct.title = t.value;
          if (e) ct.email = e.value;
          if (p) ct.phone = p.value;
        });
      }
      custEditMode = false;
      showCustomerDetail(id);
    } else {
      alert('Save failed: ' + (result.message || 'Unknown error'));
      if (saveBtn) { saveBtn.classList.remove('cust-saving'); saveBtn.innerHTML = custIcons.save + ' Save'; }
    }
  } catch (err) {
    alert('Save failed: ' + err.message);
    if (saveBtn) { saveBtn.classList.remove('cust-saving'); saveBtn.innerHTML = custIcons.save + ' Save'; }
  }
}

function custShowContactsPopup(id) {
  const c = custData.find(x => x.id === id);
  if (!c || !c.contacts || !c.contacts.length) return;
  // Remove any existing popup
  const existing = document.querySelector('.cust-contacts-popup-overlay');
  if (existing) existing.remove();

  let popHtml = `<div class="cust-contacts-popup-overlay" onclick="if(event.target===this)this.remove()">
    <div class="cust-contacts-popup">
      <button class="cust-contacts-popup-close" onclick="this.closest('.cust-contacts-popup-overlay').remove()">&times;</button>
      <div class="cust-contacts-popup-title">Contacts &middot; ${c.contacts.length}</div>`;
  c.contacts.forEach(ct => {
    popHtml += `<div class="cust-contact-card">
      <div class="cust-contact-name">${esc(ct.name || 'Unknown')}</div>
      ${ct.title ? '<div class="cust-contact-title">'+esc(ct.title)+'</div>' : ''}
      ${ct.email ? '<div class="cust-contact-row">'+custIcons.email+' <a href="mailto:'+esc(ct.email)+'">'+esc(ct.email)+'</a></div>' : ''}
      ${ct.phone ? '<div class="cust-contact-row">'+custIcons.phone+' <a href="tel:'+esc(ct.phone)+'">'+esc(ct.phone)+'</a></div>' : ''}

  // Insert into the detail panel
  const detail = document.querySelector('.cust-detail');
  if (detail) {
    detail.insertAdjacentHTML('beforeend', popHtml);
  }
}

let custProductsOpen = false;
let custProductsCache = {};

async function custToggleProducts(id) {
  const panel = document.getElementById('custProductsPanel');
  const btn = document.getElementById('custProductsBtn');
  if (!panel) return;

  if (custProductsOpen) {
    panel.classList.remove('open');
    custProductsOpen = false;
    return;
  }

  custProductsOpen = true;
  panel.classList.add('open');

  const body = panel.closest('.cust-detail-body');
  const scrollToProducts = () => {
    if (body) setTimeout(() => body.scrollTo({ top: body.scrollHeight, behavior: 'smooth' }), 120);
  };

  const c = custData.find(x => x.id === id);
  if (!c) return;

  // Check cache
  if (custProductsCache[c.name]) {
    renderProductsPanel(custProductsCache[c.name], panel);
    scrollToProducts();
    return;
  }

  panel.innerHTML = '<div class="cust-products-loading">Loading products...</div>';
  scrollToProducts();

  try {
    const API = window.location.protocol === 'file:' ? 'http://localhost:5050' : '';
    const resp = await fetch(API + '/api/products?company=' + encodeURIComponent(c.name));
    if (resp.ok) {
      const data = await resp.json();
      custProductsCache[c.name] = data.products || [];
      renderProductsPanel(custProductsCache[c.name], panel);
      scrollToProducts();
    } else {
      panel.innerHTML = '<div class="cust-products-empty">Failed to load products</div>';
    }
  } catch(e) {
    console.log('Products load error:', e);
    panel.innerHTML = '<div class="cust-products-empty">Could not connect to server</div>';
  }
}

function renderProductsPanel(products, panel) {
  if (!products.length) {
    panel.innerHTML = '<div class="cust-products-empty">No products found for this company</div>';
    return;
  }

  let html = '<table class="cust-products-table"><thead><tr>';
  html += '<th>Product</th><th>Price</th><th>Cost</th><th>Category</th>';
  html += '</tr></thead><tbody>';

  products.forEach(p => {
    const price = p.price != null && p.price !== 0 ? '$' + Number(p.price).toFixed(2) : '—';
    const cost = p.cost != null && p.cost !== 0 ? '$' + Number(p.cost).toFixed(2) : '—';
    html += `<tr>
      <td title="${esc(p.description || '')}">${esc(p.product || p.name)}</td>
      <td class="cust-products-price">${price}</td>
      <td class="cust-products-cost">${cost}</td>
      <td><span class="cust-products-cat">${esc(p.category || '—')}</span></td>
    </tr>`;
  });

  html += '</tbody></table>';
  panel.innerHTML = html;
}

// Search handler
document.getElementById('custSearch').addEventListener('input', function() {
  if (custDetailId) {
    custDetailId = null;
    custEditMode = false;
  }
  renderCustomerList(this.value);
});

// Keyboard nav inside search
document.getElementById('custSearch').addEventListener('keydown', function(e) {
  if (custDetailId && e.key !== 'Escape') return;
  const items = document.querySelectorAll('.cust-item');
  if (!items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    custHighlightIdx = Math.min(custHighlightIdx + 1, items.length - 1);
    updateCustHighlight(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    custHighlightIdx = Math.max(custHighlightIdx - 1, 0);
    updateCustHighlight(items);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const hl = document.querySelector('.cust-item.cust-highlighted');
    if (hl) {
      const id = hl.getAttribute('data-cust-id');
      if (id) showCustomerDetail(id);
    }
  }
});

function updateCustHighlight(items) {
  items.forEach(el => el.classList.remove('cust-highlighted'));
  if (custHighlightIdx >= 0 && custHighlightIdx < items.length) {
    items[custHighlightIdx].classList.add('cust-highlighted');
    items[custHighlightIdx].scrollIntoView({ block: 'nearest' });
  }
}

// ═══ SCHEDULE PANEL ═══
let schedOpen = false;
let schedData = [];
let schedLoaded = false;

function toggleSchedule() {
  schedOpen = !schedOpen;
  document.getElementById('schedPanel').classList.toggle('open', schedOpen);
  document.getElementById('schedBackdrop').classList.toggle('visible', schedOpen);
  if (schedOpen && !schedLoaded) loadSchedule();
}

async function loadSchedule() {
  const loading = document.getElementById('schedLoading');
  const content = document.getElementById('schedContent');
  loading.style.display = 'flex';

  try {
    const API = window.location.protocol === 'file:' ? 'http://localhost:5050' : '';
    const resp = await fetch(API + '/api/deliveries');
    const json = await resp.json();
    schedData = json.deliveries || [];
    schedLoaded = true;
    document.getElementById('schedCount').textContent = schedData.length ? `(${schedData.length})` : '';
    loading.style.display = 'none';
    renderSchedule();
  } catch (err) {
    console.error('Schedule load error:', err);
    loading.style.display = 'none';
    content.innerHTML = '<div class="sched-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg><div>Failed to load schedule</div></div>';
  }
}

function getStatusClass(status) {
  const s = (status || '').toLowerCase().replace(/\s+/g, '');
  const map = {
    'pending': 'sched-status-pending',
    'scheduled': 'sched-status-scheduled',
    'loaded': 'sched-status-loaded',
    'onroute': 'sched-status-onroute',
    'completed': 'sched-status-completed',
    'cancelled': 'sched-status-cancelled',
  };
  return map[s] || 'sched-status-pending';
}

function renderSchedule() {
  const content = document.getElementById('schedContent');

  if (!schedData.length) {
    content.innerHTML = `<div class="sched-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="9" y1="4" x2="9" y2="10"/><line x1="15" y1="4" x2="15" y2="10"/>
      </svg>
      <div>No deliveries scheduled for today</div>
    </div>`;
    return;
  }

  let html = `<table class="sched-table">
    <thead><tr>
      <th>Trip</th>
      <th>Company</th>
      <th>Type</th>
      <th>Driver</th>
      <th>Status</th>
      <th>Notes</th>
    </tr></thead><tbody>`;

  for (const d of schedData) {
    html += `<tr>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted)">${d.trip != null ? '#' + d.trip : '—'}</td>
      <td class="sched-customer">${esc(d.company || '—')}</td>
      <td>${d.type ? '<span class="sched-type">' + esc(d.type) + '</span>' : '—'}</td>
      <td>${esc(d.driver || '—')}</td>
      <td><span class="sched-status ${getStatusClass(d.status)}">${esc(d.status || '—')}</span></td>
      <td class="sched-notes">${esc(d.notes || '—')}</td>
    </tr>`;
  }

  html += '</tbody></table>';
  content.innerHTML = html;
}

// Keyboard shortcuts for customers
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'j') { e.preventDefault(); toggleCustomers(); }
  if (e.key === 'Escape' && custOpen) { toggleCustomers(); }
  if (e.key === 'Escape' && schedOpen) { toggleSchedule(); }
});

// ═══ INIT ═══
document.addEventListener('DOMContentLoaded', async () => {
  await loadData();
  setInterval(async () => { if (await loadData()) console.log('Refreshed'); }, 60000);
  setInterval(updateTimestamp, 30000);

  // Bounce animation on action button clicks
  document.addEventListener('click', e => {
    const btn = e.target.closest('.cust-action-btn');
    if (!btn) return;
    btn.classList.remove('btn-bounce');
    void btn.offsetWidth;
    btn.classList.add('btn-bounce');
    btn.addEventListener('animationend', () => btn.classList.remove('btn-bounce'), { once: true });
  });
});
